    ul {
      list-style-type: none;
      margin: 0;

      background-color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;

      top: 0;
      width: 100%;
      margin-left:-8px;
      display: block;
      transition: top 12s;
      z-index:10;

    li {
      float: right;
      text-align: center;
    }
    
    li a {
      display: block;
      color: black;
      text-align: center;

      transition:0.3s;

<style>

    width: 1px;
  }
  
  /* Track */

    border-radius: 10px;
  }
   
  /* Handle */
  ::-webkit-scrollbar-thumb {
    background-color: #17e600;
    border-radius: 10px;
  }
